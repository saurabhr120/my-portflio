services:
  sav-edr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sav-edr
    depends_on:
      - sav-edr-api
    ports:
      - "8081:8080"
    restart: unless-stopped

  sav-edr-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: sav-edr-api
    environment:
      PORT: 3000
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-contact@saurabhadvani.online}
    restart: unless-stopped
